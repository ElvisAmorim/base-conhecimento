site_name: Knowledge Base - Elvis Amorim

theme:
  name: material
  palette:
    # botao dark
    # Dark Mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Dark mode
      # primary: blue
      accent: deep purple

    # Light Mode
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Light mode
      # primary: blue
      accent: deep orange
  features:
    - content.code.copy
    # - content.code.select
    # Habilitando navegacao paginas
    - navigation.footer

# Habilitar emojis e icones do Material MkDocs
# markdown_extensions:
#   - attr_list
#   - pymdownx.emoji:
#       emoji_index: !!python/name:material.extensions.emoji.twemoji
#       emoji_generator: !!python/name:material.extensions.emoji.to_svg

# Melhoria de bloco de codigo
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format:
            !!python/name:pymdownx.superfences.fence_code_format # Habilitar bloco de sanfona


  - admonition
  - pymdownx.details

# Habilitando icones no rodape
extra:
  generator: true
  social:
    - icon: simple/youtube
      link: https://youtube.com.br
